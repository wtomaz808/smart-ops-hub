services:
  web:
    build:
      context: .
      dockerfile: src/SmartOpsHub.Web/Dockerfile
    ports:
      - "5050:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ApiBaseUrl=http://api:8080
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: src/SmartOpsHub.Api/Dockerfile
    ports:
      - "5100:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__SmartOpsHub=Server=sql;Database=SmartOpsHub;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=true
      - Cors__AllowedOrigins__0=http://localhost:5050
      - Cors__AllowedOrigins__1=http://web:8080
    depends_on:
      sql:
        condition: service_started
      mcp-gateway:
        condition: service_started

  mcp-gateway:
    build:
      context: .
      dockerfile: src/SmartOpsHub.Mcp/SmartOpsHub.Mcp.Gateway/Dockerfile
    ports:
      - "5200:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  sqldata:
